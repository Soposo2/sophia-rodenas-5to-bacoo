<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CV Profesional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Librería PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container">

    <!-- FORMULARIO -->
    <div class="formulario">
        <h2>Crear Curriculum</h2>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="profesion" placeholder="Profesión">

        <textarea id="resumen" placeholder="Resumen profesional"></textarea>
        <textarea id="experiencia" placeholder="Experiencia laboral"></textarea>
        <textarea id="educacion" placeholder="Educación"></textarea>

        <input type="email" id="email" placeholder="Correo">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="text" id="ciudad" placeholder="Ciudad">

        <textarea id="idiomas" placeholder="Idiomas"></textarea>
        <textarea id="habilidades" placeholder="Habilidades"></textarea>

        <label>Foto de Perfil</label>
        <input type="file" id="foto" accept="image/*">

        <button onclick="descargarPDF()">Descargar PDF</button>
    </div>

    <!-- CV -->
    <div class="cv" id="cv">

        <div class="header">
            <img id="previewFoto" src="https://via.placeholder.com/150">
            <div>
                <h1 id="previewNombre">Tu Nombre</h1>
                <h3 id="previewProfesion">Profesión</h3>
            </div>
        </div>

        <div class="main">

            <div class="sidebar">
                <h4>Contacto</h4>
                <p id="previewEmail"></p>
                <p id="previewTelefono"></p>
                <p id="previewCiudad"></p>

                <h4>Idiomas</h4>
                <p id="previewIdiomas"></p>

                <h4>Habilidades</h4>
                <p id="previewHabilidades"></p>
            </div>

            <div class="content">
                <h3>Resumen</h3>
                <p id="previewResumen"></p>

                <h3>Experiencia</h3>
                <p id="previewExperiencia"></p>

                <h3>Educación</h3>
                <p id="previewEducacion"></p>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
